name: Sync Servers

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4.7'
          bundler-cache: true

      - name: Sync servers
        run: bundle exec rake servers:sync

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet -- data/servers.rb; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check existing sync PRs
        id: existing
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --json number,headRefName | jq '[.[] | select(.headRefName | startswith("sync-servers/"))] | .[0]')
          if [ -z "$EXISTING" ] || [ "$EXISTING" = "null" ]; then
            echo "duplicate=false" >> "$GITHUB_OUTPUT"
          else
            EXISTING_NUM=$(echo "$EXISTING" | jq -r '.number')
            EXISTING_BRANCH=$(echo "$EXISTING" | jq -r '.headRefName')
            git fetch origin "$EXISTING_BRANCH"
            if git diff --quiet "origin/$EXISTING_BRANCH" -- data/servers.rb; then
              echo "duplicate=true" >> "$GITHUB_OUTPUT"
            else
              gh pr close "$EXISTING_NUM" --delete-branch || true
              echo "duplicate=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true' && steps.existing.outputs.duplicate != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="sync-servers/$(date -u +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add data/servers.rb
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Sync servers"
          git push origin "$BRANCH"
          gh pr create \
            --title "Sync servers" \
            --body "Automated server list sync from \`rake servers:sync\`." \
            --base main \
            --head "$BRANCH"
